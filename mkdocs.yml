site_name: DocLens
site_description: Multi-tenant intelligent document extraction platform on AWS Serverless
site_url: https://cincuentaydos.github.io/DocLens.Docs
repo_url: https://github.com/cincuentaydos/DocLens.Docs
repo_name: cincuentaydos/DocLens.Docs
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.action.edit
  logo: assets/logo.png
  favicon: assets/logo.png
  language: en
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Overview: overview.md
  - Architecture: architecture.md
  - Data Flow: data-flow.md
  - API Reference: api-reference.md
  - Tenant Onboarding: tenant-onboarding.md
  - ADRs:
    - ADR-001 — RAG Strategy: adrs/001-rag-strategy.md
    - ADR-002 — IaC Strategy: adrs/002-iac-strategy.md
    - ADR-003 — OCR Strategy: adrs/003-ocr-strategy.md
    - ADR-004 — Malware Scanning: adrs/004-malware-scanning.md
    - ADR-005 — Upload Strategy: adrs/005-upload-strategy.md
    - ADR-006 — Sync vs Async Processing: adrs/006-sync-vs-async-processing.md
    - IaC Comparison (CDK vs Terraform): adrs/iac-comparison.md
  - Projects:
    - DocLens.Lambda: projects/lambda.md
    - DocLens.Web.Template: projects/web-template.md
    - DocLens.Skills: projects/skills.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cincuentaydos
